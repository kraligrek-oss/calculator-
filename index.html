<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Calculator</title>
    <style>
        /* Темно-синий космический фон для всей страницы */
        body {
            background-color: #050a18;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Сам калькулятор с неоновым синим свечением */
        .calculator {
            background-color: #0b1528;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #0055ff;
            box-shadow: 0 0 20px #0055ff, inset 0 0 10px #0055ff;
        }

        /* Экран калькулятора */
        .display {
            width: 100%;
            height: 50px;
            background-color: #020611;
            border: 1px solid #00d2ff;
            border-radius: 8px;
            color: #00d2ff;
            font-size: 24px;
            text-align: right;
            padding-right: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #00d2ff;
            box-sizing: border-box;
        }

        /* Кнопки с неоновой подсветкой */
        button {
            width: 60px;
            height: 60px;
            margin: 5px;
            font-size: 20px;
            background-color: #0e1e38;
            color: #00d2ff;
            border: 1px solid #0055ff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 5px #0055ff;
            transition: 0.2s;
        }

        /* Эффект при нажатии на кнопку */
        button:active {
            background-color: #0055ff;
            color: #ffffff;
            box-shadow: 0 0 15px #00d2ff;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="result" readonly value="0">
        <div>
            <button onclick="document.getElementById('result').value=''">C</button>
            <button onclick="document.getElementById('result').value+='/'">/</button>
            <button onclick="document.getElementById('result').value+='*'">*</button>
            <button onclick="document.getElementById('result').value+='-'">-</button>
        </div>
        <div>
            <button onclick="document.getElementById('result').value+='7'">7</button>
            <button onclick="document.getElementById('result').value+='8'">8</button>
            <button onclick="document.getElementById('result').value+='9'">9</button>
            <button onclick="document.getElementById('result').value+='+'">+</button>
        </div>
        <div>
            <button onclick="document.getElementById('result').value+='4'">4</button>
            <button onclick="document.getElementById('result').value+='5'">5</button>
            <button onclick="document.getElementById('result').value+='6'">6</button>
            <button id="equal" style="height:130px; position:absolute; margin-left:5px;" onclick="try{document.getElementById('result').value=eval(document.getElementById('result').value)}catch(e){document.getElementById('result').value='Ошибка'}">=</button>
        </div>
        <div>
            <button onclick="document.getElementById('result').value+='1'">1</button>
            <button onclick="document.getElementById('result').value+='2'">2</button>
            <button onclick="document.getElementById('result').value+='3'">3</button>
        </div>
        <div>
            <button style="width:130px;" onclick="document.getElementById('result').value+='0'">0</button>
            <button onclick="document.getElementById('result').value+='.'">.</button>
        </div>
    </div>

</body>
</html>
