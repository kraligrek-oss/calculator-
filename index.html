<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Calculator</title>
    <style>
        /* ВОТ ТВОЙ НЕОНОВЫЙ ДИЗАЙН, ОН ОСТАЛСЯ НА СВОЕМ МЕСТЕ: */
        body {
            background-color: #050a18; /* Тот самый темно-синий фон */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #0b1528;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #0055ff; /* Синий неоновый ободок */
            box-shadow: 0 0 20px #0055ff, inset 0 0 10px #0055ff; /* Свечение */
        }

        .display {
            width: 100%;
            height: 65px;
            background-color: #020611;
            border: 1px solid #00d2ff; /* Светящийся экран */
            border-radius: 8px;
            color: #00d2ff;
            font-size: 15px;
            text-align: right;
            padding: 5px 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #00d2ff;
            box-sizing: border-box;
            white-space: pre-line;
            resize: none;
        }

        button {
            width: 60px;
            height: 60px;
            margin: 5px;
            font-size: 18px;
            background-color: #0e1e38;
            color: #00d2ff;
            border: 1px solid #0055ff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 5px #0055ff;
            transition: 0.2s;
        }

        button:active {
            background-color: #0055ff;
            color: #ffffff;
            box-shadow: 0 0 15px #00d2ff;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <textarea class="display" id="result" readonly>0</textarea>
        
        <div>
            <button onclick="clearAll()">C</button>
            <button onclick="convert('UAH')">грн</button>
            <button onclick="convert('EUR')">€</button>
            <button onclick="convert('GBP')">£</button>
        </div>
        <div>
            <button onclick="inputNum('7')">7</button>
            <button onclick="inputNum('8')">8</button>
            <button onclick="inputNum('9')">9</button>
            <button onclick="convert('USD')">$</button>
        </div>
        <div>
            <button onclick="inputNum('4')">4</button>
            <button onclick="inputNum('5')">5</button>
            <button onclick="inputNum('6')">6</button>
            <button onclick="convert('JPY')" style="height:130px; position:absolute; margin-left:5px;">¥</button>
        </div>
        <div>
            <button onclick="inputNum('1')">1</button>
            <button onclick="inputNum('2')">2</button>
            <button onclick="inputNum('3')">3</button>
        </div>
        <div>
            <button style="width:130px;" onclick="inputNum('0')">0</button>
            <button onclick="inputNum('.')">.</button>
        </div>
    </div>

    <script>
        let currentInput = "";
        const display = document.getElementById('result');

        // Мы исправили только эти цифры расчетов, чтобы математика не ломалась:
        const ratesInEUR = {
            EUR: 1,
            USD: 1.09,
            GBP: 0.86,
            UAH: 44.10,
            JPY: 170.50
        };

        const symbols = {
            USD: "$",
            EUR: "€",
            GBP: "£",
            UAH: "грн",
            JPY: "¥"
        };

        function inputNum(num) {
            if (currentInput === "0" && num !== ".") currentInput = "";
            currentInput += num;
            display.value = currentInput;
        }

        function clearAll() {
            currentInput = "";
            display.value = "0";
        }

        function convert(fromCurrency) {
            let amount = parseFloat(currentInput);
            if (isNaN(amount) || amount === 0) return;

            // Теперь перевод идет без багов: сначала в Евро, потом в остальные валюты
            let amountInEUR = amount / ratesInEUR[fromCurrency];
            let output = `${amount} ${symbols[fromCurrency]} равно:\n`;

            for (let curr in ratesInEUR) {
                if (curr !== fromCurrency) {
                    let converted = (amountInEUR * ratesInEUR[curr]).toFixed(2);
                    output += `${converted} ${symbols[curr]} | `;
                }
            }
            
            display.value = output.slice(0, -3); 
            currentInput = ""; 
        }
    </script>

</body>
</html>
