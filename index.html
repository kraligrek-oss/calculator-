<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Валют</title>
    <style>
        /* Стиль оформления (CSS) для красивого отображения на телефоне */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 360px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            color: #666;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Крупный шрифт, чтобы удобно нажимать на телефоне */
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #495057;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Обмен Валюты</h2>
    
    <label for="amount">Сумма:</label>
    <input type="number" id="amount" placeholder="Введите сумму" value="100">

    <label for="fromCurrency">Из валюты:</label>
    <select id="fromCurrency">
        <option value="EUR">EUR (€) Евро</option>
        <option value="USD" selected>USD ($) Доллар</option>
        <option value="RUB">RUB (₽) Рубль</option>
    </select>

    <label for="toCurrency">В валюту:</label>
    <select id="toCurrency">
        <option value="EUR" selected>EUR (€) Евро</option>
        <option value="USD">USD ($) Доллар</option>
        <option value="RUB">RUB (₽) Рубль</option>
    </select>

    <button onclick="convert()">Посчитать</button>

    <div class="result" id="resultBlock">
        Результат: Нажмите кнопку
    </div>
</div>

<script>
    // Логика калькулятора (JavaScript)
    
    // Курсы валют по отношению к базовой валюте (например, к Доллару USD)
    // 1 USD = 1 USD
    // 1 EUR = 1.08 USD (евро дороже доллара)
    // 1 RUB = 0.011 USD (рубль дешевле доллара)
    const ratesInUSD = {
        USD: 1,
        EUR: 1.08,
        RUB: 0.011
    };

    function convert() {
        // Получаем значения, которые ввел пользователь
        const amount = parseFloat(document.getElementById('amount').value);
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const resultBlock = document.getElementById('resultBlock');

        // Проверка: если пользователь ничего не ввел или ввел буквы
        if (isNaN(amount) || amount <= 0) {
            resultBlock.textContent = "Пожалуйста, введите правильную сумму";
            return;
        }

        // Переводим исходную валюту в доллары, а потом из долларов в целевую валюту
        const amountInUSD = amount * ratesInUSD[from];
        const finalResult = amountInUSD / ratesInUSD[to];

        // Округляем результат до 2 знаков после запятой (копейки/центы)
        const roundedResult = finalResult.toFixed(2);

        // Показываем результат на экране
        resultBlock.textContent = `Результат: ${roundedResult} ${to}`;
    }
</script>

</body>
</html>
